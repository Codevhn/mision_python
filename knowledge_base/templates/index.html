<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Base</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">&#9776;</button>
      <span class="brand"><span>~</span>/knowledge_base</span>
    </div>
    <div class="topbar-center">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Buscar en todas las entradas…" autocomplete="off" />
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>
    <div class="topbar-right">
      <button id="newEntryBtn" class="btn-primary">+ Nueva entrada</button>
      <button id="themeToggle" class="btn-icon" title="Cambiar tema">[light]</button>
    </div>
  </header>

  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <nav class="tree" id="tree">
        <div class="tree-empty">No hay entradas aún.</div>
      </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="content-area" id="contentArea">
      <div class="welcome" id="welcome">
        <div class="welcome-inner">
          <h1>knowledge_base --interactive</h1>
          <p>selecciona una entrada del panel izquierdo o crea una nueva.</p>
          <button class="btn-primary large" id="welcomeNewBtn">+ nueva entrada</button>
        </div>
      </div>

      <!-- ENTRY VIEW -->
      <article class="entry-view hidden" id="entryView">
        <div class="entry-header">
          <div class="entry-meta" id="entryMeta"></div>
          <div class="entry-actions">
            <button class="btn-ghost" id="editBtn">~ editar</button>
            <button class="btn-ghost" id="exportMdBtn">↓ .md</button>
            <button class="btn-ghost" id="exportPdfBtn">↓ .pdf</button>
            <button class="btn-ghost danger" id="deleteBtn">rm -f</button>
          </div>
        </div>
        <div class="entry-body" id="entryBody"></div>
      </article>
    </main>
  </div>

  <!-- MODAL: Nueva / Editar entrada -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Nueva entrada</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-row two-col">
          <div class="form-group">
            <label>Categoría</label>
            <input type="text" id="fieldCategory" placeholder="Ej: Linux" list="categorySuggestions" />
            <datalist id="categorySuggestions"></datalist>
          </div>
          <div class="form-group">
            <label>Tema</label>
            <select id="fieldTopic">
              <option value="">— Selecciona un tema —</option>
              <optgroup label="Linux y Sistemas">
                <option value="Automatización">Automatización</option>
                <option value="Scripting">Scripting</option>
                <option value="Bash / Shell">Bash / Shell</option>
                <option value="Administración de Sistemas">Administración de Sistemas</option>
                <option value="Permisos y Usuarios">Permisos y Usuarios</option>
                <option value="Procesos y Concurrencia">Procesos y Concurrencia</option>
                <option value="Systemd y Servicios">Systemd y Servicios</option>
                <option value="Gestión de Paquetes">Gestión de Paquetes</option>
                <option value="Monitoreo y Logging">Monitoreo y Logging</option>
                <option value="Cron y Tareas Programadas">Cron y Tareas Programadas</option>
              </optgroup>
              <optgroup label="Redes y Seguridad">
                <option value="Redes y Protocolos">Redes y Protocolos</option>
                <option value="Seguridad / Cybersecurity">Seguridad / Cybersecurity</option>
                <option value="Firewall y iptables">Firewall y iptables</option>
                <option value="SSH y Acceso Remoto">SSH y Acceso Remoto</option>
                <option value="Criptografía">Criptografía</option>
              </optgroup>
              <optgroup label="Programación">
                <option value="Python">Python</option>
                <option value="Algoritmos y Estructuras de Datos">Algoritmos y Estructuras de Datos</option>
                <option value="Regex y Patrones">Regex y Patrones</option>
                <option value="Procesamiento de Texto">Procesamiento de Texto</option>
                <option value="APIs y Web">APIs y Web</option>
                <option value="Bases de Datos">Bases de Datos</option>
              </optgroup>
              <optgroup label="DevOps y Herramientas">
                <option value="Git y Control de Versiones">Git y Control de Versiones</option>
                <option value="Contenedores y Docker">Contenedores y Docker</option>
                <option value="CI/CD">CI/CD</option>
                <option value="DevOps">DevOps</option>
                <option value="Herramientas de Desarrollo">Herramientas de Desarrollo</option>
                <option value="Arquitectura de Software">Arquitectura de Software</option>
              </optgroup>
              <optgroup label="Otros">
                <option value="Conceptos Generales">Conceptos Generales</option>
                <option value="Buenas Prácticas">Buenas Prácticas</option>
                <option value="Otro">Otro (personalizado)</option>
              </optgroup>
            </select>
            <input type="text" id="fieldTopicCustom" placeholder="Escribe el tema personalizado…" class="hidden" style="margin-top:6px;" />
          </div>
        </div>
        <div class="form-group">
          <label>Título de la entrada</label>
          <input type="text" id="fieldTitle" placeholder="Ej: CRON — Planificador de tareas" />
        </div>
        <div class="form-group">
          <label>Contenido <span class="label-hint">(pega texto libre, Markdown o mixto)</span></label>
          <div class="editor-tabs">
            <button class="tab active" data-tab="write">Escribir</button>
            <button class="tab" data-tab="preview">Vista previa</button>
          </div>
          <textarea id="fieldContent" rows="18" placeholder="Pega aquí tu contenido..."></textarea>
          <div class="preview-pane hidden" id="previewPane"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" id="cancelBtn">Cancelar</button>
        <button class="btn-primary" id="saveBtn">Guardar entrada</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast hidden" id="toast"></div>

  <script src="/static/app.js"></script>
</body>
</html>
