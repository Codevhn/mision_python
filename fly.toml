# fly.toml app configuration file
#
# Used by `fly deploy`. If you want to deploy a different Fly app, change `app`
# or run: `flyctl deploy -a <app-name>`

app = "mision-pythonhn"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpus = 1
  memory_mb = 1024

[[mounts]]
  source = "kb_data"
  destination = "/data"

